---
- name: Despliegue seguro del dashboard de Ceph con contraseña aleatoria
  hosts: nodo1  # Solo en el primer nodo monitor
  become: yes
  vars:
    ceph_admin_user: "admin"
    password_length: 24  # Longitud aumentada para mayor seguridad
    temp_password_file: "/tmp/ceph_dashboard_pw_{{ ansible_date_time.epoch }}.txt"

  tasks:
    - name: Generar contraseña compleja aleatoria
      ansible.builtin.shell:
        cmd: >
          openssl rand -base64 {{ password_length }} | tr -d '/+=' | cut -c1-{{ password_length }}
      register: generated_password
      changed_when: false
      no_log: true

    - name: Crear archivo temporal seguro
      ansible.builtin.copy:
        dest: "{{ temp_password_file }}"
        content: "{{ generated_password.stdout }}"
        mode: 0600
      no_log: true

    - name: Configurar nueva contraseña en Ceph Dashboard
      ansible.builtin.command: >
        ceph dashboard ac-user-set-password {{ ceph_admin_user }}
        -i "{{ temp_password_file }}"
      register: password_change
      changed_when: "'Password updated' in password_change.stdout"
      no_log: true

    - name: Obtener URL del dashboard
      ansible.builtin.command: ceph mgr services
      register: mgr_services
      changed_when: false

    - name: Mostrar credenciales de forma segura
      ansible.builtin.debug:
        msg: |
          ⚠️ CREDENCIALES CEPH DASHBOARD ⚠️
          URL: {{ (mgr_services.stdout|from_json).dashboard }}
          Usuario: {{ ceph_admin_user }}
          Contraseña: {{ generated_password.stdout }}
          
          IMPORTANTE:
          1. Guarde esta información inmediatamente
          2. La contraseña no se volverá a mostrar
          3. Cambie la contraseña después del primer acceso
      run_once: true
      no_log: false  # Muestra deliberadamente solo en esta tarea

    - name: Eliminar archivo temporal
      ansible.builtin.file:
        path: "{{ temp_password_file }}"
        state: absent

    - name: Guardar copia de seguridad local encriptada (opcional)
      ansible.builtin.copy:
        dest: "./ceph_credentials_{{ inventory_hostname }}.txt.gpg"
        content: "{{ generated_password.stdout }}"
        mode: 0600
      delegate_to: localhost
      run_once: true
      when: false  # Cambiar a 'true' y descomentar el bloque siguiente si quieres guardar cifrada
      # vars:
      #   ansible_vault_password_file: "~/.vault_pass.txt"
